name: Refresh NBA data

on:
  schedule:
    - cron: "8 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Gate refresh to start of Los Angeles day
        id: gate
        run: |
          if [ "$(TZ=America/Los_Angeles date +%H)" != "00" ]; then
            echo "run_refresh=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "run_refresh=true" >> "$GITHUB_OUTPUT"

      - name: Refresh published data
        if: steps.gate.outputs.run_refresh == 'true'
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/refresh_nba_data.py

      - name: Commit refreshed data
        if: steps.gate.outputs.run_refresh == 'true'
        run: |
          if git diff --quiet -- docs/daily-data.json; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/daily-data.json
          git commit -m "Refresh NBA data"
          git push
